<!DOCTYPE html>
<html>
<head>
<title>School Bus Tracker Signup</title>

<style>

*{
    box-sizing:border-box;
}

/* BODY */

body{
    margin:0;
    font-family:'Segoe UI', Arial, sans-serif;
    background:#e2e8f0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CONTAINER */

.signup-container{
    background:white;
    padding:40px;
    border-radius:16px;
    width:380px;
    box-shadow:0 12px 30px rgba(0,0,0,0.12);
    text-align:center;
    border:1px solid #cbd5f5;
}

/* ICON */

.bus-icon{
    font-size:42px;
    margin-bottom:10px;
}

/* TITLE */

.signup-container h2{
    margin-bottom:20px;
    color:#1e40af;
    font-weight:600;
}

/* INPUT */

.input-field, .select-field{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #cbd5f5;
    font-size:14px;
    transition:0.2s;
}

.input-field:focus, .select-field:focus{
    outline:none;
    border-color:#1e40af;
    box-shadow:0 0 0 2px rgba(30,64,175,0.15);
}

/* BUTTON */

.signup-btn{
    width:100%;
    padding:12px;
    background:#1e40af;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
}

.signup-btn:hover{
    background:#1d4ed8;
    box-shadow:0 6px 15px rgba(30,64,175,0.3);
}

/* MESSAGES */

.message{
    margin-top:10px;
    font-size:14px;
}

.message.success{
    color:#16a34a;
}

.message.error{
    color:#dc2626;
}

/* LINKS */

.login-link{
    margin-top:18px;
    font-size:14px;
    color:#475569;
}

.login-link a{
    text-decoration:none;
    color:#1e40af;
    font-weight:600;
}

.login-link a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="signup-container">

<div class="bus-icon">🚌</div>

<h2>Create Account</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Enter Username" class="input-field">

<input type="email" name="email" placeholder="Enter Email" class="input-field">

<input type="password" name="password" placeholder="Enter Password" class="input-field">

<input type="text" name="mobile" placeholder="Enter Mobile Number" class="input-field">

<select name="role" class="select-field">
    <option value="">Select Role</option>
    <option value="parent">Parent</option>
    <option value="conductor">Conductor</option>
    <option value="school">School</option>
</select>

<button type="submit" class="signup-btn">Signup</button>

<!-- DJANGO MESSAGES -->

{% if messages %}
    {% for message in messages %}
        <p class="message {% if message.tags == 'error' %}error{% else %}success{% endif %}">
            {{ message }}
        </p>
    {% endfor %}
{% endif %}

{% if errors %}
    {% for error in errors %}
        <p class="message error">{{ error }}</p>
    {% endfor %}
{% endif %}

</form>

<div class="login-link">
Already have an account?
<a href="{% url 'login' %}">Login</a>
</div>

</div>

</body>
</html>
