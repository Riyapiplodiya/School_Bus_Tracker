<!DOCTYPE html>
<html>
<head>
<title>School Bus Tracker Login</title>

<style>

body{
    margin:0;
    padding:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(120deg,#0f4c81,#f7c948);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{
    background:white;
    padding:40px;
    border-radius:10px;
    width:350px;
    box-shadow:0px 8px 20px rgba(0,0,0,0.2);
    text-align:center;
}

.login-container h2{
    margin-bottom:25px;
    color:#0f4c81;
}

.input-field{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

.input-field:focus{
    outline:none;
    border-color:#0f4c81;
}

.login-btn{
    width:100%;
    padding:12px;
    background:#f7c948;
    border:none;
    border-radius:6px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#f0b429;
}

.signup-link{
    margin-top:15px;
    display:block;
}

.signup-link a{
    text-decoration:none;
    color:#0f4c81;
    font-weight:bold;
}

.signup-link a:hover{
    text-decoration:underline;
}

.bus-icon{
    font-size:40px;
    margin-bottom:10px;
}

</style>
</head>

<body>
    

<div class="login-container">

<div class="bus-icon">🚌</div>

<h2>School Bus Tracker</h2>

<form method="POST">
{% csrf_token %}
<input type="hidden" name="role" value="{{ role }}">

<input type="text" name="username" placeholder="Enter Username" class="input-field">

<input type="password" name="password" placeholder="Enter Password" class="input-field">

<button type="submit" class="login-btn">Login</button>
{% if error %}
<p style="color:red; margin-top:10px;">{{ error }}</p>
{% endif %}


</form>

<div class="signup-link">
<a href="{% url 'home' %}">Back</a>
Don't have an account?  
<a href="{% url 'signup' %}">Signup</a>
</div>

</div>

</body>
</html>
