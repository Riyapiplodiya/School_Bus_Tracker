<!DOCTYPE html>
<html>
<head>
<title>User List</title>
</head>
<body>

<h2>User List</h2>

<table border="1">
<tr>
<th>Username</th>
<th>Email</th>
<th>Mobile</th>
<th>Role</th>
</tr>

{% for user in users %}
<tr>
<td>{{ user.username }}</td>
<td>{{ user.email }}</td>
<td>{{ user.mobile_number }}</td>
<td>{{ user.get_role_display }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
