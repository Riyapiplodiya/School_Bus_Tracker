{% extends "base/dashboard_base.html" %}

{% block content %}

<div class="card">

<h3>Mark Attendance</h3>

<form method="POST">
{% csrf_token %}

<table>

<tr>
<th>Student</th>
<th>Present</th>
<th>Absent</th>
</tr>

{% for student in students %}

<tr>
<td>{{ student.name }}</td>

<td>
<input type="radio" name="{{ student.id }}" value="present">
</td>

<td>
<input type="radio" name="{{ student.id }}" value="absent">
</td>

</tr>

{% endfor %}

</table>

<button type="submit">Save Attendance</button>

</form>

</div>

{% endblock %}
